name: Docs · Build & Deploy

# Publica el sitio Starlight (docs/site) en GitHub Pages cuando cambia la documentación.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Permisos mínimos para desplegar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un despliegue a la vez; no cancelamos los que ya están en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # El prebuild (scripts/sync-adrs.mjs) sincroniza los ADRs de docs/adr.
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
