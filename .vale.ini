# Configuración de Vale para la prosa de la documentación de FlowSync.
StylesPath = .github/styles
MinAlertLevel = error

[*.{md,mdx}]
# Estilo base incorporado en Vale (evita repeticiones, dobles espacios, etc.).
BasedOnStyles = Vale
# La documentación está en español: desactivamos el corrector ortográfico inglés.
Vale.Spelling = NO
